<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="078_testcr.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">가정용 꿀사과</h1>
            <div class="header-info">
                <p>흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다</p>
                <p>질 좋은 사과를 저렴하게 즐겨보세요</p>
            </div>
        </div>
    </div>
    <br>
    <div class="main">
        <div class="main-title">
            <p>확인하세요</p>
        </div>
        <div class="main-content">
            <p class="item">주문 및 배송</p>
            <p class="info"><span>오후 2시 이전</span> 주문 건은 당일 발송합니다</p>
            <p class="info">2시 이후 주문 건은 다음 날 발송합니다(주말 제외)</p>
            <p class="item">교환 및 환불</p>
            <p class="info">불만족시 <span>100% 환불</span>해 드립니다</p>
            <p class="info">고객센터로 전화주세요</p>
        </div>
        <div class="main-content">
            <p class="item">고객센터</p>
            <p class="info">0000-0000</p>
            <p class="info-text-small">상담 시간 : 오전 9시 ~ 오후 6시 (토/일 공휴일 휴무)</p>
        </div>
    </div>
</body>
</html>
