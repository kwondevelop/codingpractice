<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="078_test.css">
    <title>가정용 꿀사과</title>
</head>
<body>
    <div class="box1">
        <h1 class="box1-h1">가정용 꿀사과</h1>
        <p class="box1-p">
        흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다.
        <br>질 좋은 사과를 저렴하게 즐겨보세요
        </p>
    </div>
    <div class="box2">
        <p class="box2-p">확인하세요</p>
    </div>
    <div class="box3">
        <h1 class="box3-h1">주문 및 배송</h1>
        <p class="box3-p"><span>오후 2시 이전</span> 주문 건은 당일 발송합니다</p>
        <p class="box3-p">2시 이후 주문 건은 다음 날 발송합니다(주말 제외)</p>
        <h1 class="box3-h1">교환 및 환불</h1>
        <p class="box3-p">불만족시 <span>100% 환불</span>해드립니다</p>
        <p class="box3-p">고객센터로 전화주세요</p>
    </div>
    <hr>
    <div class="box4">
        <h1 class="box4-h1">고객센터</h1>
        <p class="box4-p">0000-0000</p>
        <p class="box4-p">상담 시간 : 오전 9시 ~ 오후 6시 (토/일 공휴일 휴무)</p>
    </div>
    <img class="box-image" src="./꿀사과.jpg" alt="가정용 꿀사과">
