<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="01_styleSheet.css">
  <title>01_styleSheet</title>
  <style>
    h2 {
      color: pink;
    }
  </style>
</head>
<body>
  <!-- 인라인 스타일 : HTML 요소에 "style 속성" 을 통해 직접 스타일을 적용한다 -->
  <h1 style="color: skyblue">안녕 CSS</h1>
  <!-- 내부 스타일 : head 태그에 style 태그를 사용하여 스타일을 적용한다 -->
  <h2>내부 스타일</h2>
  <!-- 외부 스타일 : 별도의 css 파일을 작성하고, "head 태그" 에 "link 태그" 를 사용하여 스타일을 적용한다 -->
  <h3>외부 스타일</h3>
</body>
</html>
