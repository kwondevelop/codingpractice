<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form tng</title>
</head>
  <body>
    <div style="background-color: beige;">
    <div style="background-color: violet; color: white;">
    <h1>회원가입을 환영합니다</h1>
    </div>
    <div style="background-color: pink;">
      <form action="" method="get">
        <fieldset>
          <legend>사용자 정보</legend>
            <ul>
              <li>
                <label for="id">아이디</label>
                <input 
                type="text" 
                id="id" 
                minlength="4" 
                maxlength="10" 
                placeholder="4자 ~ 10자 사이, 공백 없이">
              </li>
              <li>
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="example@example.com">
              </li>
              <li>
                <label for="password">비밀번호</label>
                <input 
                type="password" 
                id="password" 
                minlength="8" 
                maxlength="20" 
                placeholder="문자와 숫자, 특수 기호 포함">
              </li>
              <li>
                <label for="passwordcheck">비밀번호 확인</label>
                <input 
                type="password" 
                id="passwordcheck" 
                minlength="8" 
                maxlength="20" 
                placeholder="">
              </li>
              <li>
                <label for="path">가입 경로</label>
                  <select name="path" id="path">
                    <option value="etc" selected>기타</option>
                    <option value="homepage">홈페이지</option>
                  </select>
              </li>
              <li>
                <label for="memo">메모</label>
                <textarea
                name="memo" 
                id="memo" 
                cols="30" 
                rows="10" 
                placeholder="남길 말씀이 있다면 여기에"></textarea>
              </li>
            </ul>
        </fieldset>
        </div>
        <br>
        <div style="background-color: lightblue;">
        <fieldset>
          <legend>이벤트와 새로운 소식</legend>
            <input type="radio" id="mailok" name="mail" value="ok">
            <label for="mailok">메일 수신</label>
            <input type="radio" id="mailno" name="mail" value="no">
            <label for="mailno">메일 수신 안함</label> 
        </fieldset>
        </div>
        <br>
        <div style="background-color: lightgreen;">
          <button type="submit">가입하기</button>
          <button type="reset">취소</button>
        </div>
      </form>
    </div>
  </body>
</html>
