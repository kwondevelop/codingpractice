<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>multimedia</title>
</head>
<body>
  <!-- audio 태그 : 웹 문서에 소리 컨텐츠를 삽입 -->
  <audio src="./capybararesort.mp4" controls></audio>
  <!-- video 태그 : 웹 문서에 영상 컨텐츠를 삽입(소리 포함) -->
  <!-- muted : 영상 소리를 끔 -->
  <!-- autoplay : 영상을 자동 재생 -->
  <!-- poster : 영상 썸네일 -->
  <video src="./capybararesort.mp4" controls></video>
</body>
</html>
