<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 관련 태그</title>
</head>
  <body>

    <!-- h 태그 : 제목 또는 부제목 태그 -->
    <h1>h1 tag</h1>
    <h2>h2 tag</h2>
    <h3>h3 tag</h3>
    <h4>h4 tag</h4>
    <h5>h5 tag</h5>
    <h6>h6 tag</h6>
    <h1>숫자가 올라갈수록 글씨 크기는 작아집니다</h1>
    <!-- h${h$ tag}*6 -->

    <!-- hr 태그 : 가로 선 긋기 -->
    <hr>

    <!-- br 태그 : 개행(줄 바꿈) -->
    br 태그의
    <br>
    예시입니다
    <br>

    이렇게도<br>사용 가능합니다

    <!-- p 태그 : 하나의 문단 표시 -->
    <p>
      예시 문단입니다
    </p>
    <p>
      또 다른 예시 문단입니다
    </p>
    
    <!-- strong, b 태그 : 글자를 굵게 -->
    <!-- strong 태그는 화면 낭독기에서 강조를 해줌 -->
    <strong>strong 태그</strong>
    <br>
    <b>b 태그</b>
    <br>

    <!-- em, i 태그 : 글자를 기울임(이텔릭체) -->
    <!-- em 태그도 화면 낭독기에서 강조를 해줌 -->
    <br>
    <em>em 태그</em>
    <br>
    <i>i 태그</i>

    <!-- ul, li 태그 : 순서가 없는 목록 표현 -->
    <!-- li 태그는 ul 태그의 하위에 위치 -->
     <ul>
      <li>예시</li>
     </ul>

  </body>
</html>
