<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a</title>
</head>
<body>
  <!-- a 태그 : 하이퍼링크를 사용할 때 이용 -->
  <!-- href 속성 : 링크할 대상의 URL을 지정 -->
  <!-- target 속성 : 링크를 열 때의 동작을 지정 -->
  <!-- _blank : 새 창에서 열기 -->
  <!-- title 속성 : 링크에 커서를 올리면 표시되는 (내가 지정한)텍스트 -->
  <a href="https://www.naver.com" target="_blank" title="네이버로 가는 버튼">네이버</a>
  <br><br>
  <a href="./01_text.html" target="_blank" title="01_text.html로 가는 버튼">어디로 갈까요</a>
</body>
</html>
