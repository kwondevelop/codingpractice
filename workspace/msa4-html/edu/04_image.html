<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tag</title>
</head>
<body>
  <!-- 절대 경로 -->
  <!-- root로 부터 특정 파일까지의 전체 경로(고유 경로) -->
  <!-- 
  근데 잘 안 씀 -->
  <img src="E:\codingpractice\workspace\msa4-html\edu\capybara.jpg" alt="카피바라 사진">
  <!-- 상대 경로 -->
  <!-- 현재 문서를 기준으로 해당 파일의 경로를 인식 -->
  <img src="/capybara.jpg" alt="카피바라 사진">
  <img src="./capybara.jpg" alt="카피바라 사진">
  <img src="../img/capybara2.jpg" alt="카피바라 사진">
</body>
</html>
